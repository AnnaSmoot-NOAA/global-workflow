experiment:
  system: gefs
  mode: forecast-only

arguments:
  account: {{ 'HPC_ACCOUNT' | getenv }}
  pslot: {{ 'pslot' | getenv }}
  app: S2SWA
  resdetatmos: 48
  resdetocean: 5.0
  resensatmos: 48
  nens: 30
  interval: 24
  start: cold
  comroot: {{ 'RUNTESTS' | getenv }}/COMROOT
  expdir: {{ 'RUNTESTS' | getenv }}/EXPDIR
  icsdir: /lfs/h2/emc/ens/noscrub/eric.sinsky/RETRO_ICS
  idate: 2024112500
  edate: 2024112500
  yaml: {{ HOMEgfs }}/dev/ci/cases/yamls/gefs_defaults_ci.yaml

# TODO run on supported platforms once the gefs forecast and subsequent tasks can succeed with RETRO ICs
skip_ci_on_hosts:
  - gaeac6
  - gaeac5
  - hercules
  - wcoss2
  - hera
  - orion
  - awsepicglobalworkflow
